<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Prayer Board</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet"/>
<style>
  :root {
    --navy: #0f1f3d;
    --navy-mid: #162a50;
    --gold: #c9a84c;
    --gold-light: #e8c96a;
    --cream: #f5f0e8;
    --shadow: 0 4px 24px rgba(15,31,61,0.25);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Lora', serif; background: var(--navy); min-height: 100vh; color: var(--cream); }
  body::before {
    content: ''; position: fixed; inset: 0;
    background:
      radial-gradient(ellipse at 15% 15%, rgba(201,168,76,0.10) 0%, transparent 55%),
      radial-gradient(ellipse at 85% 85%, rgba(30,58,110,0.55) 0%, transparent 55%),
      repeating-linear-gradient(45deg, transparent, transparent 40px, rgba(255,255,255,0.012) 40px, rgba(255,255,255,0.012) 41px);
    pointer-events: none; z-index: 0;
  }
  .screen { display: none; position: relative; z-index: 1; }
  .screen.active { display: block; }

  /* LOGIN */
  #login-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
  #login-screen.active { display: flex; }
  .login-card {
    background: rgba(255,255,255,0.05); border: 1px solid rgba(201,168,76,0.3);
    border-radius: 24px; padding: 56px 48px; text-align: center;
    max-width: 440px; width: 100%; backdrop-filter: blur(12px);
    box-shadow: var(--shadow); animation: fadeUp 0.5s ease;
  }
  .login-cross { font-size: 2.2rem; color: var(--gold); letter-spacing: 6px; display: block; margin-bottom: 20px; }
  .login-card h1 { font-family: 'Cinzel', serif; font-size: 2.2rem; font-weight: 700; letter-spacing: 0.05em; margin-bottom: 10px; text-shadow: 0 2px 16px rgba(201,168,76,0.25); }
  .login-card .verse { font-style: italic; color: var(--gold-light); font-size: 0.9rem; line-height: 1.7; opacity: 0.85; margin-bottom: 38px; }
  .google-btn {
    display: inline-flex; align-items: center; gap: 12px;
    background: white; color: #333; border: none; border-radius: 50px;
    padding: 14px 32px; font-size: 1rem; font-family: 'Lora', serif; font-weight: 500;
    cursor: pointer; box-shadow: 0 4px 16px rgba(0,0,0,0.3);
    transition: transform 0.2s, box-shadow 0.2s; width: 100%; justify-content: center;
  }
  .google-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.35); }
  .google-btn svg { width: 20px; height: 20px; flex-shrink: 0; }
  .login-error {
    margin-top: 16px; background: rgba(229,115,115,0.15);
    border: 1px solid rgba(229,115,115,0.4); border-radius: 10px;
    padding: 12px 16px; font-size: 0.88rem; color: #ef9a9a; display: none;
  }
  .signing-in {
    margin-top: 16px; font-size: 0.88rem; color: var(--gold-light);
    font-style: italic; display: none; opacity: 0.8;
  }

  /* APP */
  #app-screen { min-height: 100vh; }
  .app { max-width: 900px; margin: 0 auto; padding: 20px; }
  header { text-align: center; padding: 44px 0 32px; border-bottom: 1px solid rgba(201,168,76,0.25); margin-bottom: 30px; }
  .header-cross { font-size: 1.5rem; color: var(--gold); letter-spacing: 5px; display: block; margin-bottom: 10px; }
  header h1 { font-family: 'Cinzel', serif; font-size: clamp(1.8rem,5vw,2.8rem); font-weight: 700; letter-spacing: 0.05em; text-shadow: 0 2px 12px rgba(201,168,76,0.25); }

  .user-bar {
    display: flex; align-items: center; justify-content: space-between;
    background: rgba(255,255,255,0.04); border: 1px solid rgba(201,168,76,0.15);
    border-radius: 12px; padding: 10px 18px; margin-bottom: 26px;
  }
  .user-info { display: flex; align-items: center; gap: 10px; font-size: 0.92rem; }
  .user-avatar { width: 32px; height: 32px; border-radius: 50%; border: 2px solid var(--gold); object-fit: cover; }
  .ghost-btn {
    background: transparent; border: 1px solid rgba(201,168,76,0.28);
    color: var(--gold-light); border-radius: 8px; padding: 5px 14px;
    font-size: 0.8rem; cursor: pointer; font-family: 'Lora', serif; transition: all 0.2s;
  }
  .ghost-btn:hover { background: rgba(201,168,76,0.1); }

  .add-form {
    background: rgba(255,255,255,0.04); border: 1px solid rgba(201,168,76,0.2);
    border-radius: 16px; padding: 26px; margin-bottom: 28px; backdrop-filter: blur(10px);
  }
  .add-form h2 { font-family: 'Cinzel', serif; font-size: 1rem; color: var(--gold-light); margin-bottom: 16px; letter-spacing: 0.06em; }
  .form-row { display: flex; gap: 12px; flex-wrap: wrap; }
  .form-group { flex: 1; min-width: 180px; }
  .form-group label { display: block; font-size: 0.78rem; letter-spacing: 0.09em; text-transform: uppercase; color: var(--gold); margin-bottom: 5px; opacity: 0.72; }
  .form-group input, .form-group textarea, .form-group select {
    width: 100%; background: rgba(255,255,255,0.06); border: 1px solid rgba(201,168,76,0.2);
    border-radius: 10px; padding: 11px 14px; color: var(--cream); font-family: 'Lora', serif;
    font-size: 0.92rem; outline: none; transition: border-color 0.2s; resize: vertical;
  }
  .form-group input:focus, .form-group textarea:focus, .form-group select:focus { border-color: var(--gold); background: rgba(255,255,255,0.08); }
  .form-group select option { background: var(--navy); }
  .form-group textarea { min-height: 74px; }
  .primary-btn {
    margin-top: 14px; background: linear-gradient(135deg, var(--gold) 0%, #a8843a 100%);
    color: var(--navy); border: none; border-radius: 10px; padding: 12px 28px;
    font-family: 'Cinzel', serif; font-size: 0.9rem; font-weight: 700; letter-spacing: 0.05em;
    cursor: pointer; transition: all 0.2s; box-shadow: 0 4px 14px rgba(201,168,76,0.3);
  }
  .primary-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(201,168,76,0.4); }
  .primary-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  .stats-bar { font-size: 0.84rem; color: rgba(201,168,76,0.62); font-style: italic; margin-bottom: 12px; }
  .filter-bar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
  .filter-btn {
    background: rgba(255,255,255,0.05); border: 1px solid rgba(201,168,76,0.16);
    color: var(--cream); border-radius: 50px; padding: 7px 16px; font-family: 'Lora', serif;
    font-size: 0.86rem; cursor: pointer; opacity: 0.62; transition: all 0.2s;
  }
  .filter-btn.active { background: var(--gold); color: var(--navy); border-color: var(--gold); opacity: 1; font-weight: 600; }
  .filter-btn:hover:not(.active) { opacity: 1; background: rgba(255,255,255,0.08); }

  .prayers-grid { display: grid; gap: 13px; }
  .prayer-card {
    background: rgba(255,255,255,0.04); border: 1px solid rgba(201,168,76,0.15);
    border-radius: 14px; padding: 19px 20px 19px 25px; backdrop-filter: blur(10px);
    transition: border-color 0.2s, background 0.2s; position: relative; overflow: hidden;
    animation: fadeUp 0.35s ease;
  }
  .prayer-card::before {
    content: ''; position: absolute; left: 0; top: 0; bottom: 0;
    width: 4px; background: var(--gold); border-radius: 4px 0 0 4px;
  }
  .prayer-card.answered::before { background: #4caf7d; }
  .prayer-card:hover { border-color: rgba(201,168,76,0.32); background: rgba(255,255,255,0.06); }
  .prayer-card.answered { background: rgba(45,106,79,0.07); border-color: rgba(76,175,125,0.22); }

  .card-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; margin-bottom: 7px; }
  .card-title { font-family: 'Cinzel', serif; font-size: 0.98rem; font-weight: 600; line-height: 1.4; }
  .card-badges { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; flex-shrink: 0; }
  .badge { border-radius: 50px; padding: 2px 10px; font-size: 0.72rem; letter-spacing: 0.03em; }
  .badge-cat { background: rgba(201,168,76,0.13); color: var(--gold-light); border: 1px solid rgba(201,168,76,0.2); }
  .badge-ans { background: rgba(76,175,125,0.16); color: #81c995; border: 1px solid rgba(76,175,125,0.32); }
  .card-details { font-size: 0.91rem; line-height: 1.65; color: rgba(245,240,232,0.78); margin-bottom: 9px; }
  .card-date { font-size: 0.75rem; color: rgba(201,168,76,0.52); font-style: italic; margin-bottom: 10px; }
  .card-actions { display: flex; gap: 8px; flex-wrap: wrap; }
  .act-btn {
    background: transparent; border: 1px solid rgba(255,255,255,0.1);
    color: rgba(245,240,232,0.52); border-radius: 8px; padding: 5px 12px;
    cursor: pointer; font-size: 0.77rem; font-family: 'Lora', serif; transition: all 0.18s;
  }
  .act-btn:hover { background: rgba(255,255,255,0.07); color: var(--cream); }
  .act-btn.ans:hover { border-color: #81c995; color: #81c995; }
  .act-btn.del:hover { border-color: #e57373; color: #e57373; }

  .notes-wrap { margin-top: 13px; }
  .note-item {
    background: rgba(255,255,255,0.04); border-left: 3px solid rgba(201,168,76,0.26);
    border-radius: 0 8px 8px 0; padding: 8px 12px; margin-bottom: 6px;
    font-size: 0.86rem; color: rgba(245,240,232,0.7);
  }
  .note-meta { font-size: 0.72rem; color: rgba(201,168,76,0.46); margin-bottom: 2px; }
  .add-note-row { display: flex; gap: 8px; margin-top: 8px; }
  .note-input {
    flex: 1; background: rgba(255,255,255,0.05); border: 1px solid rgba(201,168,76,0.16);
    border-radius: 8px; padding: 8px 12px; color: var(--cream); font-family: 'Lora', serif;
    font-size: 0.86rem; outline: none; transition: border-color 0.2s;
  }
  .note-input:focus { border-color: var(--gold); }
  .note-add-btn {
    background: rgba(201,168,76,0.13); border: 1px solid rgba(201,168,76,0.28);
    color: var(--gold-light); border-radius: 8px; padding: 6px 14px;
    cursor: pointer; font-family: 'Lora', serif; font-size: 0.84rem; transition: all 0.18s;
  }
  .note-add-btn:hover { background: rgba(201,168,76,0.23); }

  .empty-state { text-align: center; padding: 54px 20px; opacity: 0.42; }
  .empty-icon { font-size: 2.5rem; margin-bottom: 12px; }
  .empty-state p { font-style: italic; }
  .loading { text-align: center; padding: 40px; opacity: 0.48; font-style: italic; }

  @keyframes fadeUp { from { opacity:0; transform:translateY(14px); } to { opacity:1; transform:translateY(0); } }
  @media(max-width:600px) {
    .login-card { padding: 40px 26px; }
    .add-form { padding: 18px; }
    .prayer-card { padding: 16px 16px 16px 21px; }
  }
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="login-screen" class="screen active">
  <div class="login-card">
    <span class="login-cross">&#10022; &#10013; &#10022;</span>
    <h1>Prayer Board</h1>
    <p class="verse">"Do not be anxious about anything, but in everything by prayer and supplication, with thanksgiving, let your requests be made known to God."<br/><em>&#8212; Philippians 4:6</em></p>
    <button class="google-btn" id="signin-btn" onclick="signInWithGoogle()">
      <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Sign in with Google
    </button>
    <div class="signing-in" id="signing-in">Signing in, please wait...</div>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<!-- APP SCREEN -->
<div id="app-screen" class="screen">
  <div class="app">
    <header>
      <span class="header-cross">&#10022; &#10013; &#10022;</span>
      <h1>Prayer Board</h1>
    </header>

    <div class="user-bar">
      <div class="user-info">
        <img id="user-avatar" class="user-avatar" src="" alt="" style="display:none"/>
        <span id="user-name"></span>
      </div>
      <button class="ghost-btn" onclick="doSignOut()">Sign out</button>
    </div>

    <div class="add-form">
      <h2>+ New Prayer Request</h2>
      <div class="form-row">
        <div class="form-group" style="flex:2">
          <label>Prayer Request *</label>
          <input type="text" id="prayer-title" placeholder="Who or what are you praying for?"/>
        </div>
        <div class="form-group" style="flex:1">
          <label>Category</label>
          <select id="prayer-category">
            <option>Personal</option><option>Family</option><option>Friends</option>
            <option>Health</option><option>Work</option><option>Community</option>
            <option>World</option><option>Other</option>
          </select>
        </div>
      </div>
      <div class="form-group" style="margin-top:12px">
        <label>Details (optional)</label>
        <textarea id="prayer-details" placeholder="Share more about this prayer request..."></textarea>
      </div>
      <button class="primary-btn" id="add-btn" onclick="addPrayer()">Add to Prayer Board</button>
    </div>

    <div class="stats-bar" id="stats-bar"></div>
    <div class="filter-bar">
      <button class="filter-btn active" onclick="setFilter('all',this)">All</button>
      <button class="filter-btn" onclick="setFilter('active',this)">Active</button>
      <button class="filter-btn" onclick="setFilter('answered',this)">Answered &#10003;</button>
      <button class="filter-btn" onclick="setFilter('Personal',this)">Personal</button>
      <button class="filter-btn" onclick="setFilter('Family',this)">Family</button>
      <button class="filter-btn" onclick="setFilter('Health',this)">Health</button>
    </div>
    <div class="prayers-grid" id="prayers-list"><div class="loading">Loading your prayers...</div></div>
  </div>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
import { getAuth, GoogleAuthProvider, signInWithRedirect, getRedirectResult, signOut, onAuthStateChanged }
  from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
import { getDatabase, ref, push, onValue, update, remove }
  from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js';

const firebaseConfig = {
  apiKey: "AIzaSyDcGf3RewwFxVzQmQWl3-LhasbJNNob5eU",
  authDomain: "bible-tracker-f7fa8.firebaseapp.com",
  databaseURL: "https://bible-tracker-f7fa8-default-rtdb.firebaseio.com",
  projectId: "bible-tracker-f7fa8",
  storageBucket: "bible-tracker-f7fa8.firebasestorage.app",
  messagingSenderId: "587610044890",
  appId: "1:587610044890:web:0df524416f2636c4ff28e3",
  measurementId: "G-R57HCKQ2HC"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

let currentUser = null;
let allPrayers = [], currentFilter = 'all', expandedNotes = new Set();

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function showLoginError(msg) {
  document.getElementById('login-error').textContent = msg;
  document.getElementById('login-error').style.display = 'block';
  document.getElementById('signing-in').style.display = 'none';
  document.getElementById('signin-btn').style.display = 'flex';
}

// Check for redirect result when page loads (Safari redirect flow)
getRedirectResult(auth).then(result => {
  if (result && result.user) {
    console.log('Redirect sign-in success:', result.user.email);
  }
}).catch(e => {
  console.error('Redirect result error:', e.code, e.message);
  showLoginError('Sign-in failed: ' + e.message);
});

window.signInWithGoogle = async () => {
  document.getElementById('login-error').style.display = 'none';
  document.getElementById('signin-btn').style.display = 'none';
  document.getElementById('signing-in').style.display = 'block';
  try {
    await signInWithRedirect(auth, new GoogleAuthProvider());
  } catch(e) {
    console.error('Redirect error:', e.code, e.message);
    showLoginError('Sign-in failed: ' + e.message);
  }
};

window.doSignOut = async () => {
  await signOut(auth);
};

onAuthStateChanged(auth, user => {
  console.log('Auth state:', user ? user.email : 'signed out');
  currentUser = user;
  if (user) {
    document.getElementById('user-name').textContent = user.displayName || user.email;
    const av = document.getElementById('user-avatar');
    if (user.photoURL) { av.src = user.photoURL; av.style.display = 'inline-block'; }
    showScreen('app-screen');
    loadPrayers();
  } else {
    document.getElementById('signing-in').style.display = 'none';
    document.getElementById('signin-btn').style.display = 'flex';
    showScreen('login-screen');
  }
});

function loadPrayers() {
  onValue(ref(db, 'prayers/' + currentUser.uid), snap => {
    allPrayers = [];
    snap.forEach(c => allPrayers.push({ id: c.key, ...c.val() }));
    allPrayers.sort((a,b) => (b.createdAt||0) - (a.createdAt||0));
    renderPrayers();
  }, e => {
    console.error('Database error:', e);
    document.getElementById('prayers-list').innerHTML =
      '<div class="empty-state"><div class="empty-icon">&#9888;&#65039;</div><p>Database error: ' + e.message + '</p></div>';
  });
}

window.addPrayer = async () => {
  const title = document.getElementById('prayer-title').value.trim();
  if (!title) { alert('Please enter a prayer request.'); return; }
  const btn = document.getElementById('add-btn');
  btn.disabled = true;
  await push(ref(db, 'prayers/' + currentUser.uid), {
    title,
    details: document.getElementById('prayer-details').value.trim(),
    category: document.getElementById('prayer-category').value,
    answered: false,
    createdAt: Date.now()
  });
  document.getElementById('prayer-title').value = '';
  document.getElementById('prayer-details').value = '';
  btn.disabled = false;
};

window.toggleAnswered = (id, cur) =>
  update(ref(db, 'prayers/' + currentUser.uid + '/' + id), {
    answered: !cur,
    answeredAt: !cur ? Date.now() : null
  });

window.deletePrayer = async id => {
  if (!confirm('Remove this prayer from your board?')) return;
  await remove(ref(db, 'prayers/' + currentUser.uid + '/' + id));
};

window.addNote = async id => {
  const inp = document.getElementById('ni-' + id);
  const text = inp.value.trim();
  if (!text) return;
  await push(ref(db, 'prayers/' + currentUser.uid + '/' + id + '/notes'), {
    text, createdAt: Date.now()
  });
  inp.value = '';
};

window.setFilter = (f, btn) => {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderPrayers();
};

window.toggleNotes = id => {
  if (expandedNotes.has(id)) expandedNotes.delete(id);
  else expandedNotes.add(id);
  renderPrayers();
};

function renderPrayers() {
  const list = document.getElementById('prayers-list');
  let filtered = allPrayers;
  if (currentFilter === 'active') filtered = allPrayers.filter(p => !p.answered);
  else if (currentFilter === 'answered') filtered = allPrayers.filter(p => p.answered);
  else if (currentFilter !== 'all') filtered = allPrayers.filter(p => p.category === currentFilter);

  const total = allPrayers.length;
  const ans = allPrayers.filter(p => p.answered).length;
  document.getElementById('stats-bar').textContent =
    total ? total + ' prayer' + (total !== 1 ? 's' : '') + ' \u00b7 ' + ans + ' answered \u00b7 ' + (total - ans) + ' active' : '';

  if (!filtered.length) {
    list.innerHTML = '<div class="empty-state"><div class="empty-icon">&#128591;</div><p>' +
      (currentFilter === 'all' ? 'No prayer requests yet. Add your first one above.' : 'No prayers in this category.') +
      '</p></div>';
    return;
  }

  list.innerHTML = filtered.map(p => {
    const notes = p.notes ? Object.values(p.notes).sort((a,b) => a.createdAt - b.createdAt) : [];
    const show = expandedNotes.has(p.id);
    const date = p.createdAt ? new Date(p.createdAt).toLocaleDateString('en-US', {month:'short',day:'numeric',year:'numeric'}) : '';
    const notesHtml = show ? (
      '<div class="notes-wrap">' +
      notes.map(n =>
        '<div class="note-item"><div class="note-meta">' +
        new Date(n.createdAt).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}) +
        '</div>' + esc(n.text) + '</div>'
      ).join('') +
      '<div class="add-note-row">' +
      '<input class="note-input" id="ni-' + p.id + '" placeholder="Add a note or update..." ' +
      'onkeydown="if(event.key===\'Enter\')addNote(\'' + p.id + '\')" />' +
      '<button class="note-add-btn" onclick="addNote(\'' + p.id + '\')">Add</button>' +
      '</div></div>'
    ) : '';

    return '<div class="prayer-card ' + (p.answered ? 'answered' : '') + '">' +
      '<div class="card-header">' +
      '<div class="card-title">' + esc(p.title) + '</div>' +
      '<div class="card-badges">' +
      '<span class="badge badge-cat">' + esc(p.category || 'Other') + '</span>' +
      (p.answered ? '<span class="badge badge-ans">&#10003; Answered</span>' : '') +
      '</div></div>' +
      (p.details ? '<div class="card-details">' + esc(p.details) + '</div>' : '') +
      '<div class="card-date">' + date + '</div>' +
      '<div class="card-actions">' +
      '<button class="act-btn ans" onclick="toggleAnswered(\'' + p.id + '\',' + p.answered + ')">' +
      (p.answered ? '&#8629; Unmark' : '&#10003; Mark Answered') + '</button>' +
      '<button class="act-btn" onclick="toggleNotes(\'' + p.id + '\')">' +
      '&#128221; Notes' + (notes.length ? ' (' + notes.length + ')' : '') + ' ' + (show ? '&#9650;' : '&#9660;') + '</button>' +
      '<button class="act-btn del" onclick="deletePrayer(\'' + p.id + '\')">&#10005; Remove</button>' +
      '</div>' + notesHtml + '</div>';
  }).join('');
}

function esc(s) {
  return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
</body>
</html>
